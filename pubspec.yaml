name: khosh_hesab
description: "خوش‌حساب — مدیریت دخل‌وخرجِ شخصی، رایگان، آفلاین و خصوصی."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management — ADR-0002
  flutter_riverpod: ^2.5.1

  # Data layer (SQLite, type-safe, reactive) — ADR-0003
  drift: ^2.16.0
  sqlite3_flutter_libs: ^0.5.20   # کتابخانهٔ بومیِ sqlite همراهِ اپ (بدونِ نیاز به GMS)
  path_provider: ^2.1.2
  path: ^1.9.0

  # تاریخِ شمسی — ADR-0005
  shamsi_date: ^1.0.4
  intl: ^0.20.2          # هم‌خط با پینِ flutter_localizations در SDK

  # نمودارها (تمایزِ محصول)
  fl_chart: ^0.66.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  drift_dev: ^2.16.0            # تولیدِ کدِ drift (database.g.dart)

flutter:
  uses-material-design: true
